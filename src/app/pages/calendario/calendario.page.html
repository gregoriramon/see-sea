<app-header tituloPagina="Mi Calendario" />
<ion-content>
  <div *ngIf="grupos.length === 0" class="calendario-vacio" style="padding: 24px; text-align: center; color: var(--ion-color-medium);">
    <p>No tienes travesias favoritas aún.</p>
    <ion-button expand="block" (click)="irABuscar()" style="margin-top: 16px; --background: #2a8299; --background-hover: #2a8299; --background-activated: #2a8299; --background-focused: #2a8299; --color: #ffffff;">
      Buscar travesías
    </ion-button>
  </div>

  <ion-accordion-group *ngIf="grupos.length > 0" [value]="mesesAbiertos" [multiple]="true" (ionChange)="onAccordionChange($event)">
    <ion-accordion *ngFor="let g of grupos; trackBy: trackByClave" [value]="g.clave">
      <ion-item slot="header" class="mes-header" lines="none">
        <ion-label class="mes-titulo">
          {{ g.titulo | titlecase }} <span class="mes-contador">({{ g.eventos.length }})</span>
        </ion-label>
      </ion-item>
      <div slot="content">
        <app-evento
          *ngFor="let ev of g.eventos"
          [evento]="ev"
          [esParticularFavorito]="true"
          [mostrarBotonFavorito]="false"
          (toggleFavorito)="onToggleFavorito(ev)">
        </app-evento>
      </div>
    </ion-accordion>
  </ion-accordion-group>
</ion-content>
