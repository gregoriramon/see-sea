<app-header [tituloPagina]="'pages.favoritas.title' | translate"/>

<ion-content [fullscreen]="true">
  @if (isLoading) {
    <div class="loading-screen">
      <img src="/assets/sisi.svg" [alt]="'pages.favoritas.loadingAlt' | translate" />
      <p class="loading-text">{{ 'loading.favoritas' | translate }}</p>
    </div>
  } @else {
<!--     <div style="padding: 16px; display: flex; justify-content: flex-end;">
      <ion-button color="secondary" shape="round" fill="solid" size="small" (click)="irABuscar()">
        +
      </ion-button>
    </div> -->
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
    <section>
      @if (favoritas.length === 0) {
      <div style="padding: 24px; text-align: center; color: var(--ion-color-medium);">
        <p>{{ 'pages.favoritas.empty' | translate }}</p>
        <ion-button expand="block" (click)="irABuscar()" style="margin-top: 16px; --background: #2a8299; --background-hover: #2a8299; --background-activated: #2a8299; --background-focused: #2a8299; --color: #ffffff;">
          {{ 'pages.favoritas.searchBeaches' | translate }}
        </ion-button>
      </div>
    } @else {
      <ion-grid [fixed]="true">
        <ion-reorder-group class="favoritas-reorder" [disabled]="false" (ionItemReorder)="handleReorder($event)">
          @for (item of favoritas; track item.cod_playa; let i = $index) {
          <ion-col size="12" size-md="6" size-lg="4" class="ion-no-padding favorita-wrapper">
            <ion-reorder class="reorder-strip"><span class="reorder-hint"></span></ion-reorder>
            <app-playa
              [conDetalle]=false
              [playa]="item"
              [esParticularFavorita]="esFavorita(item)"
              [prediccionColapsable]="true"
              [prediccionExpandidaInicial]="i === 0"
              (toggleFavorita)="onToggleFavorita($event)">
            </app-playa>
          </ion-col>
          }
        </ion-reorder-group>
      </ion-grid>
    }
  </section>
  }
</ion-content>
