<ion-header>
  <ion-toolbar class="filtro-toolbar">
    <ion-grid class="ion-no-padding">
      @if (showProvincias) {
        <ion-row>
          <ion-col size="12">
            <ion-select label="Provincia" label-placement="stacked" fill="outline"
              [(ngModel)]="selectedProvincia"
              (ionChange)="onProvinciaChange($event.detail.value)"
              class="compact-select">
              <ion-select-option value="**">Todas</ion-select-option>
              @for (provincia of provinciasList; track provincia.cod_provincia) {
                <ion-select-option [value]="provincia.cod_provincia">{{ provincia.provincia }}</ion-select-option>
              }
            </ion-select>
          </ion-col>
        </ion-row>
      }

      @if (showRangoFecha) {
        <ion-row>
          <ion-col size="12">
            <ion-select label="Fechas" label-placement="stacked" fill="outline"
              [(ngModel)]="selectedRango"
              (ionChange)="onRangoChange($event.detail.value)"
              class="compact-select">
              <ion-select-option value="3m">Próximos 3 meses</ion-select-option>
              <ion-select-option value="6m">Próximos 6 meses</ion-select-option>
              <ion-select-option value="12m">Próximos 12 meses</ion-select-option>
            </ion-select>
          </ion-col>
        </ion-row>
      }

      @if (showName) {
        <ion-row class="ion-align-items-center">
          <ion-col size="12">
            <ion-searchbar
              placeholder="Descripción, lugar, municipio u organizador"
              [(ngModel)]="patterName"
              [debounce]="500"
              (ionInput)="onPatterNameChange()"
              class="compact-search">
            </ion-searchbar>
          </ion-col>
        </ion-row>
      }

      @if (showDistancia) {
        <ion-row class="ion-align-items-center">
          <ion-col size="6">
            <ion-input type="number" label="Dist. mín (m)" label-placement="stacked" fill="outline"
              [(ngModel)]="distanciaMin"
              (ionChange)="onDistanciaChange()"
              class="compact-input">
            </ion-input>
          </ion-col>
          <ion-col size="6">
            <ion-input type="number" label="Dist. máx (m)" label-placement="stacked" fill="outline"
              [(ngModel)]="distanciaMax"
              (ionChange)="onDistanciaChange()"
              class="compact-input">
            </ion-input>
          </ion-col>
        </ion-row>
      }
    </ion-grid>
  </ion-toolbar>
</ion-header>
