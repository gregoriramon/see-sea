<ion-header>
  <ion-toolbar class="filtro-toolbar">
    <ion-grid class="ion-no-padding">
      <!-- Provincia (Solo si aplica) -->
      @if(showProvincias){
      <ion-row>
        <ion-col size="12">
          <ion-select label="Provincia" label-placement="stacked" fill="outline" [(ngModel)]="selectedProvincia"
            (ionChange)="onProvinciaChange($event.detail.value)" class="compact-select">
            <ion-select-option value="**">Todas</ion-select-option>
            @for (provincia of provinciasList; track provincia.cod_provincia) {
            <ion-select-option [value]="provincia.cod_provincia">{{ provincia.provincia }}</ion-select-option>
            }
          </ion-select>
        </ion-col>
      </ion-row>
      }

      <ion-row class="ion-align-items-center">
        <!-- Búsqueda -->
        <ion-col size="12">
          <ion-searchbar placeholder="Municipo, Playa , Cala ..." [(ngModel)]="patterName"
            [debounce]="500"
            (ionInput)="onPatterNameChange()" class="compact-search">
          </ion-searchbar>
        </ion-col>

        <!-- Botón Reset -->
<!--        <ion-col size="2" class="ion-text-center">-->
<!--          <ion-button fill="clear" (click)="resetFiltros()" title="Limpiar filtros">-->
<!--            <ion-icon slot="icon-only" name="close-circle-outline" color="primary"></ion-icon>-->
<!--          </ion-button>-->
<!--        </ion-col>-->
      </ion-row>
    </ion-grid>
  </ion-toolbar>
</ion-header>
