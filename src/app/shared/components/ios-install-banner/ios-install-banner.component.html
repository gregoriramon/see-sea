@if (visible) {
  <div class="ios-install-banner" role="dialog" aria-live="polite">
    <button type="button" class="close-btn" (click)="dismiss()" aria-label="Cerrar">
      <ion-icon name="close"></ion-icon>
    </button>
    <div class="title">Instala SiSi (SeeSea) en tu pantalla de inicio</div>
    <ol class="steps">
      <li>
        Pulsa el botón <strong>Compartir</strong>
        <ion-icon name="share-outline" aria-label="Compartir"></ion-icon>
        en la barra de Safari.
      </li>
      <li>
        Elige <strong>«Añadir a pantalla de inicio»</strong>
        <ion-icon name="add-outline" aria-label="Añadir"></ion-icon>
        en el menú.
      </li>
      <li>
        Pulsa <strong>«Añadir»</strong> arriba a la derecha.
      </li>
    </ol>
    <div class="actions">
      <button type="button" class="action-btn primary" (click)="yaInstalada()">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        Ya la tengo instalada
      </button>
    </div>
  </div>
}
