<ion-item lines="full" class="playa-compact-item">
  <!-- Icono de location en la parte izquierda - clickeable para abrir Google Maps -->
  <ion-button slot="start" fill="clear" size="big" (click)="abrirGoogleMaps()" class="location-start-button">
    <ion-icon slot="icon-only"  name="location" color="primary"></ion-icon>
  </ion-button>

  <ion-label>
    <!-- Nombre de playa -->
    <h2 class="playa-nombre">{{ playa.playa }}</h2>

    <!-- Municipio -->
    <p class="municipio-text">{{ playa.municipio }}</p>

    <!-- Provincia -->
    <p class="provincia-text">{{ playa.provincia }} </p>

    <p >{{ playa.aemet_date |diaSemana}}</p>

  </ion-label>

  <!-- Botón de favoritos con corazón en la parte derecha -->
  <div slot="end" class="actions-col">
    <ion-button
      fill="clear"
      size="small"
      (click)="onToggleFavorita($event)"
      class="favorita-button">
      <ion-icon
        slot="icon-only"
        [name]="esParticularFavorita ? 'heart' : 'heart-outline'"
        [color]="esParticularFavorita ? 'danger' : 'medium'">
      </ion-icon>
    </ion-button>
  </div>

</ion-item>
<ion-label class="playa-prediccion" >
  <p>Predicción: {{ playa.prediccion }}</p>
</ion-label>
@if (playa.prediccion) {
<ion-accordion-group >
  <ion-accordion   value="Prediccion">
    <ion-item slot="header" color="light">
      <ion-label>{{playa.prediccion}}</ion-label>
    </ion-item>
    <div class="ion-padding" slot="content">First Content</div>
  </ion-accordion>
  </ion-accordion-group>
  }
