<ion-item lines="full" class="playa-compact-item">

  <div slot="start">
    <ion-label>
      <!-- Contenedor flex para alinear en la misma línea -->
      <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <h2 class="playa-nombre" style="margin: 0;">{{ playa.playa }}</h2>
      </div>
      <!-- Municipio -->
      <p class="municipio-text">{{ playa.municipio }}</p>
      <!-- Provincia -->
      <p class="provincia-text">{{ playa.provincia }} </p>
    </ion-label>
  </div>
  <!-- Botón de favoritos con corazón en la parte derecha -->
  <div slot="end" class="vertical-buttons">
    <!-- Icono de location en la parte izquierda - clickeable para abrir Google Maps -->
    @if (playa.prediccion) {
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
      <p class="playa-oleaje" [style.color]="getColorOleaje(playa.prediccion.dia[primerDia].oleaje.f1, false)"
        style="margin: 0;">
        {{ playa.prediccion.dia[primerDia].oleaje.f1 | oleaje }}
      </p>
      <fa-icon [icon]="faWater"
        [style.color]="getColorOleaje(playa.prediccion.dia[primerDia].oleaje.f1, false)"></fa-icon>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: baseline;">
      <p style="margin: 0;">
        {{ playa.prediccion.dia[primerDia].tAgua.valor1 }}
      </p>
      <fa-icon [icon]="faTemp"></fa-icon>
    </div>
    } @else {
    <ion-button slot="end" fill="clear" size="big" (click)="abrirGoogleMaps()" class="location-start-button">
      <ion-icon slot="icon-only" name="location" color="primary"></ion-icon>
    </ion-button>
    }
    <ion-button fill="clear" size="small" (click)="onToggleFavorita($event)" class="favorita-button">
      <ion-icon slot="icon-only" [name]="esParticularFavorita ? 'heart' : 'heart-outline'"
        [color]="esParticularFavorita ? 'danger' : 'medium'">
      </ion-icon>
    </ion-button>
  </div>

</ion-item>

  @if (playa.prediccion) {
    <div slot="content">
      <app-tabla-pronostico [dias]="diasNoPasados"></app-tabla-pronostico>
    </div>
  }
